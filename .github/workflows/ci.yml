name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder-key' }}
          NEXT_PUBLIC_SITE_URL: https://placeholder.example.com
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder-vapid-public-key
          VAPID_PRIVATE_KEY: placeholder-vapid-private-key
          VAPID_SUBJECT: mailto:ci@placeholder.example.com
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          CRON_SECRET: placeholder-cron-secret
